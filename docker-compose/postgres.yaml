---
services:
  # Init container: provisions pg_oidc_validator.so into a shared named volume
  # which `postgres` then mounts read-only at /usr/lib/postgresql/extra. Uses
  # upstream Percona pg_oidc_validator (prebuilt .deb with source-build
  # fallback). To rebuild, run `docker compose --profile postgres down -v` to
  # drop the volume.
  postgres-validator-build:
    container_name: postgres-validator-build
    image: postgres:18.3-trixie
    restart: "no"
    environment:
      VALIDATOR_SO_PATH: /validator-out/pg_oidc_validator.so
    volumes:
      - postgres-validator-lib:/validator-out
      - ./config/postgres/install-validator.sh:/usr/local/bin/install-validator.sh:ro
    command:
      - bash
      - /usr/local/bin/install-validator.sh
    profiles:
      - postgres

  postgres:
    container_name: postgres
    image: postgres:18.3-trixie
    restart: unless-stopped
    mem_limit: 1024m
    ports:
      - 5432:5432
    environment:
      POSTGRES_DB: app
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres:/var/lib/postgresql
      - postgres-validator-lib:/usr/lib/postgresql/extra:ro
      - ./config/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./config/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./config/postgres/init:/docker-entrypoint-initdb.d:ro
      - ./config/postgres/entrypoint.sh:/usr/local/bin/custom-entrypoint.sh:ro
      # Self-signed Keycloak CA, trusted by the entrypoint so the validator's
      # libcurl-driven HTTPS fetch of `keycloak:8443` succeeds.
      - type: bind
        source: ./config/keycloak/certs/keycloak.pem
        target: /etc/keycloak-ca/keycloak.pem
        read_only: true
        bind:
          create_host_path: false
    entrypoint: ["bash", "/usr/local/bin/custom-entrypoint.sh"]
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
    depends_on:
      keycloak-setup:
        condition: service_completed_successfully
      postgres-validator-build:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app -h 127.0.0.1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s
    profiles:
      - postgres

  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4:9.14
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: pgadmin4@pgadmin.org
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./config/pgadmin/servers.json:/pgadmin4/servers.json
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - postgres

networks:
  default:
    name: "cheetah-infrastructure"

volumes:
  postgres:
  pgadmin-data:
  postgres-validator-lib:
