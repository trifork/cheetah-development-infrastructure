---
services:
  keycloak:
    mem_limit: 512m
    cpus: 2
    image: quay.io/keycloak/keycloak:25.0.6
    hostname: keycloak
    container_name: keycloak
    command:
      - "start-dev"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: true
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: true
      KC_HOSTNAME: https://keycloak:8443/
      # Admin console reachable from the host without /etc/hosts.
      KC_HOSTNAME_ADMIN: https://localhost:8443/
      KC_HOSTNAME_STRICT: false
      KC_HTTP_PORT: 1852
      KC_HTTPS_PORT: 8443
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/certs/keycloak.pem
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/certs/keycloak-key.pem
    volumes:
      # Run `bash config/keycloak/certs/generate-certs.sh` once to create the certs.
      - type: bind
        source: ./config/keycloak/certs/keycloak.pem
        target: /opt/keycloak/certs/keycloak.pem
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./config/keycloak/certs/keycloak-key.pem
        target: /opt/keycloak/certs/keycloak-key.pem
        read_only: true
        bind:
          create_host_path: false
    ports:
      - 1852:1852
      - 8443:8443
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/127.0.0.1/8443",
        ]
      interval: 30s # (default: 30s)
      timeout: 10s # (default: 30s)
      retries: 10 #  (default: 3)
      start_period: 30s # (default: 0s)
      start_interval: 5s # be more aggressive with the start interval, as keycloak blocks other containers from starting
    profiles:
      - kafka-core
      - opensearch-core
      - schema-registry-core
      - core
      - kafka
      - opensearch
      - observability
      - postgres
      - full

  keycloak-setup:
    mem_limit: 512m
    container_name: keycloak-setup
    pull_policy: build
    build:
      context: ./config/keycloak
      dockerfile: Dockerfile
    depends_on:
      keycloak:
        condition: service_healthy
    volumes:
      - ./config/keycloak/local-development.json:/tmp/local-development.json
    environment:
      - KEYCLOAK_URL=http://keycloak:1852
      - KEYCLOAK_USER=admin
      - KEYCLOAK_PASSWORD=admin
      - KEYCLOAK_AVAILABILITY-CHECK_ENABLED=true
      - SPRING_PROFILES_ACTIVE=dev
      - IMPORT_CACHE_ENABLED=false
      - IMPORT_VARSUBSTITUTION_ENABLED=false
      - DEMO_CLIENT_NAME=${DEMO_CLIENT_NAME}
      - DEMO_CLIENT_SECRET=${DEMO_CLIENT_SECRET}
      - DEMO_CLIENT_ROLES=${DEMO_CLIENT_ROLES}
    profiles:
      - kafka-core
      - opensearch-core
      - schema-registry-core
      - core
      - kafka
      - opensearch
      - observability
      - postgres
      - full

networks:
  default:
    name: "cheetah-infrastructure"
