---
services:
  keycloak:
    mem_limit: 512m
    cpus: 2
    image: quay.io/keycloak/keycloak:25.0.6
    hostname: keycloak
    container_name: keycloak
    command:
      - "start-dev"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: true
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: true
      KC_HOSTNAME: http://keycloak:1852/
      KC_HOSTNAME_STRICT: false
      KC_HTTP_PORT: 1852
    ports:
      - 1852:1852
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/1852"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s
      start_interval: 5s
    profiles:
      - kafka-core
      - opensearch-core
      - schema-registry-core
      - core
      - kafka
      - opensearch
      - observability
      - postgres
      - full

  keycloak-setup:
    mem_limit: 512m
    container_name: keycloak-setup
    pull_policy: build
    build:
      context: ./config/keycloak
      dockerfile: Dockerfile
    depends_on:
      keycloak:
        condition: service_healthy
    volumes:
      - ./config/keycloak/local-development.json:/tmp/local-development.json
      - ./config/keycloak/master.json:/tmp/master.json
    environment:
      - KEYCLOAK_URL=http://keycloak:1852
      - KEYCLOAK_USER=admin
      - KEYCLOAK_PASSWORD=admin
      - KEYCLOAK_AVAILABILITY-CHECK_ENABLED=true
      - SPRING_PROFILES_ACTIVE=dev
      - IMPORT_CACHE_ENABLED=false
      - IMPORT_VARSUBSTITUTION_ENABLED=false
      - DEMO_CLIENT_NAME=${DEMO_CLIENT_NAME}
      - DEMO_CLIENT_SECRET=${DEMO_CLIENT_SECRET}
      - DEMO_CLIENT_ROLES=${DEMO_CLIENT_ROLES}
    profiles:
      - kafka-core
      - opensearch-core
      - schema-registry-core
      - core
      - kafka
      - opensearch
      - observability
      - postgres
      - full

networks:
  default:
    name: "cheetah-infrastructure"
