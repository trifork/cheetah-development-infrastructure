listen_addresses = '*'
port = 5432

dynamic_library_path = '/usr/lib/postgresql/extra:$libdir'
oauth_validator_libraries = 'pg_oidc_validator'
pg_oidc_validator.authn_field = 'preferred_username'

# Two local-dev knobs from the sibling pg_oidc_validator/ fork:
#   1. skip TLS verify so we don't mount the self-signed Keycloak cert here
#   2. fetch discovery+JWKS via docker DNS, since pg_hba's `localhost` issuer
#      points at this container, not Keycloak. JWT `iss` is still validated
#      against pg_hba's issuer.
pg_oidc_validator.insecure_skip_tls_verify = on
pg_oidc_validator.discovery_url_override = 'https://keycloak:8443/realms/local-development'

hba_file = '/etc/postgresql/pg_hba.conf'
