# Local admin access from inside the container.
local   all             postgres                                peer
local   all             all                                     peer

# OAuth-only for network clients. Issuer must match KC_HOSTNAME.
host    all             all             0.0.0.0/0               oauth issuer=https://keycloak:8443/realms/local-development scope="postgres"
host    all             all             ::/0                    oauth issuer=https://keycloak:8443/realms/local-development scope="postgres"
